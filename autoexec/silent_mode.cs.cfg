//================ Update Logs <Start>================//

// v0.1.0-alpha：
// 我制作了这个《静音模式》脚本，效果貌似不错。

//================ Update Logs <End>================//


//================ Core <Start>================//

// 此部分为脚本的核心（Core）部分。
// 除非你知道自己在做什么，否则请勿做任何修改。

// alias "mwheel" "mouse_wheel";

alias "silent_mode_on"   "cl_mute_enemy_team 1; cl_sanitize_player_names 1;   alias "silent_mode_toggle" "silent_mode_off";   alias "silent_mode_quest" "silent_mode_quest_value_on";   silent_mode_custom_actions_on; ";
alias "silent_mode_off"   "cl_mute_enemy_team 0; cl_sanitize_player_names 0;   alias "silent_mode_toggle" "silent_mode_on";   alias "silent_mode_quest" "silent_mode_quest_value_off";   silent_mode_custom_actions_off; ";
alias "silent_mode_toggle" "silent_mode_off";

alias "silent_mode_quest_value_on" "echoln "[CFG][silent_mode] silent_mode = ON"; ";
alias "silent_mode_quest_value_off" "echoln "[CFG][silent_mode] silent_mode = OFF"; ";
alias "silent_mode_quest" "silent_mode_quest_value_off";
alias "silent_mode" "silent_mode_quest";

//================ Core <End>================//


//================ Actions <Start>================//

// 此部分为脚本的操作（Actions）部分，可以按照注释修改指定的代码。
// 此处的所有命令，都有可能影响其他的脚本。
// 如果你不希望执行某一行的命令，可以在指定行的开头添加“ // ”（两个正斜杠）。
// 开头带有“ // ”的行，其中的所有命令将不会被执行。

// 强制关闭静音模式。
silent_mode_off;

// 设置“小键盘数字 8”键为切换静音模式的开关。
// 你可以将“ KP_8 ”替换为其他的按键，使用你自己喜欢的按键触发开关。
//bind "KP_8" "silent_mode_toggle";

//================ Actions <End>================//


//================ Custom Actions <Start>================//

// 此部分为脚本的自定义操作（Custom Actions）部分，可以自定义修改此脚本。
// 除非你知道自己在做什么，否则请勿做任何修改。
// 如果你有一些想要添加的自定义脚本，请在这里添加。
// 比如，“当切换静音模式时切换 HUD 颜色”。
// 示例：
//alias "silent_mode_custom_actions_on" "echoln "[CFG][silent_mode] Silent Mode: ON."; say_team "[CFG][silent_mode] 静音模式 开启。"; ";
