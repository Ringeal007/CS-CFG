//alias "silent_mode_custom_actions_on" "echoln "[CFG][silent_mode] Silent Mode: ON."; cl_hud_color 6; ";
//alias "silent_mode_custom_actions_off" "echoln "[CFG][silent_mode] Silent Mode: OFF."; cl_hud_color 0; ";

alias "silent_mode_custom_actions_on" "echoln "[CFG][silent_mode] Silent Mode: ON."; ";
alias "silent_mode_custom_actions_off" "echoln "[CFG][silent_mode] Silent Mode: OFF."; ";

//================ Custom Actions <End>================//
