//================ Core <Start>================//

// 此部分为脚本的核心（Core）部分。
// 除非你知道自己在做什么，否则请勿做任何修改。

alias "+drop_bomb" "slot3; slot5; +drop_bomb_custom_actions; ";
alias "-drop_bomb" "slot3; slot5; drop; -drop_bomb_custom_actions; ";

//================ Core <End>================//


//================ Actions <Start>================//

// 此部分为脚本的操作（Actions）部分，可以按照注释修改指定的代码。
// 此处的所有命令，都有可能影响其他的脚本。
// 如果你不希望执行某一行的命令，可以在指定行的开头添加“ // ”（两个正斜杠）。
// 开头带有“ // ”的行，其中的所有命令将不会被执行。

// 设置“ U ”键为丢弃炸弹的开关。
// 你可以将“ U ”替换为其他的按键，使用你自己喜欢的按键触发开关。
//bind "u" "+drop_bomb";

//================ Actions <End>================//


//================ Custom Actions <Start>================//

// 此部分为脚本的自定义操作（Custom Actions）部分，可以自定义修改此脚本。
// 除非你知道自己在做什么，否则请勿做任何修改。
// 如果你有一些想要添加的自定义脚本，请在这里添加。
// 比如，当丢弃炸弹后，在队伍频道里发送“我丢弃了炸弹”。
// 示例：
// alias "-drop_bomb_custom_actions" "echoln "[CFG][drop_bomb] Dropped the bomb."; say_team "我丢弃了炸弹。"; ";

//alias "-drop_bomb_custom_actions" "echoln "[CFG][drop_bomb] Dropped the bomb."; ";
alias "-drop_bomb_custom_actions" "echoln "[CFG][drop_bomb] Dropped the bomb."; say_team "我丢弃了炸弹。"; ";

//================ Custom Actions <End>================//
