//================ Core <Start>================//

// 此部分为脚本的核心（Core）部分。
// 除非你知道自己在做什么，否则请勿做任何修改。

alias "hud_color_switching_mode_on"   "bind "MWHEELUP" "hud_color_prev"; bind "MWHEELDOWN" "hud_color_next";   alias "hud_color_switching_mode_toggle" "hud_color_switching_mode_off";   alias "hud_color_switching_mode_quest" "hud_color_switching_mode_quest_value_on";   hud_color_switching_mode_custom_actions_on; ";
alias "hud_color_switching_mode_off"   "bind "MWHEELUP" "invprev"; bind "MWHEELDOWN" "invnext";   alias "hud_color_switching_mode_toggle" "hud_color_switching_mode_on";   alias "hud_color_switching_mode_quest" "hud_color_switching_mode_quest_value_off";   hud_color_switching_mode_custom_actions_off; ";
alias "hud_color_switching_mode_toggle" "hud_color_switching_mode_off";

alias "hud_color_switching_mode_quest_value_on" "echoln "[CFG][hud_color_switching_mode] hud_color_switching_mode = ON"; ";
alias "hud_color_switching_mode_quest_value_off" "echoln "[CFG][hud_color_switching_mode] hud_color_switching_mode = OFF"; ";
alias "hud_color_switching_mode_quest" "hud_color_switching_mode_quest_value_off";
alias "hud_color_switching_mode" "hud_color_switching_mode_quest";

alias "hud_color_prev" "hud_color_num_11";
alias "hud_color_next" "hud_color_num_0";

alias "hud_color_num_0" "alias "hud_color_prev" "hud_color_num_11"; alias "hud_color_next" "hud_color_num_12"; cl_hud_color 0; ";
alias "hud_color_num_12" "alias "hud_color_prev" "hud_color_num_0"; alias "hud_color_next" "hud_color_num_1"; cl_hud_color 12; ";
alias "hud_color_num_1" "alias "hud_color_prev" "hud_color_num_12"; alias "hud_color_next" "hud_color_num_2"; cl_hud_color 1; ";
alias "hud_color_num_2" "alias "hud_color_prev" "hud_color_num_1"; alias "hud_color_next" "hud_color_num_3"; cl_hud_color 2; ";
alias "hud_color_num_3" "alias "hud_color_prev" "hud_color_num_2"; alias "hud_color_next" "hud_color_num_4"; cl_hud_color 3; ";
alias "hud_color_num_4" "alias "hud_color_prev" "hud_color_num_3"; alias "hud_color_next" "hud_color_num_5"; cl_hud_color 4; ";
alias "hud_color_num_5" "alias "hud_color_prev" "hud_color_num_4"; alias "hud_color_next" "hud_color_num_6"; cl_hud_color 5; ";
alias "hud_color_num_6" "alias "hud_color_prev" "hud_color_num_5"; alias "hud_color_next" "hud_color_num_7"; cl_hud_color 6; ";
alias "hud_color_num_7" "alias "hud_color_prev" "hud_color_num_6"; alias "hud_color_next" "hud_color_num_8"; cl_hud_color 7; ";
alias "hud_color_num_8" "alias "hud_color_prev" "hud_color_num_7"; alias "hud_color_next" "hud_color_num_9"; cl_hud_color 8; ";
alias "hud_color_num_9" "alias "hud_color_prev" "hud_color_num_8"; alias "hud_color_next" "hud_color_num_10"; cl_hud_color 9; ";
alias "hud_color_num_10" "alias "hud_color_prev" "hud_color_num_9"; alias "hud_color_next" "hud_color_num_11"; cl_hud_color 10; ";
alias "hud_color_num_11" "alias "hud_color_prev" "hud_color_num_10"; alias "hud_color_next" "hud_color_num_0"; cl_hud_color 11; ";

alias "switch_hud_color" "hud_color_next";
alias "switch_hud_color_prev" "hud_color_prev";
alias "switch_hud_color_next" "hud_color_next";

//================ Core <End>================//


//================ Actions <Start>================//

// 此部分为脚本的操作（Actions）部分，可以按照注释修改指定的代码。
// 此处的所有命令，都有可能影响其他的脚本。
// 如果你不希望执行某一行的命令，可以在指定行的开头添加“ // ”（两个正斜杠）。
// 开头带有“ // ”的行，其中的所有命令将不会被执行。

// 强制关闭 HUD 颜色切换模式。
hud_color_switching_mode_off;

// 设置“小键盘数字 9”键为切换 HUD 颜色切换模式的开关。
// 你可以将“ KP_9 ”替换为其他的按键，使用你自己喜欢的按键触发开关。
//bind "KP_9" "hud_color_switching_mode_toggle";

//================ Actions <End>================//


