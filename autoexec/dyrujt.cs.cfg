// alias "dyrujt" "do_you_really_understand_jame_time";

alias "dyrujt" "dyrujt_001";

alias "dyrujt_001" "alias "dyrujt" "dyrujt_002"; say "你真的懂《JAME TIME》么？它使得VP更容易控制经济和打乱对手预判"; ";
alias "dyrujt_002" "alias "dyrujt" "dyrujt_003"; say "来自Virtus.pro的Jame可能是CSGO中拥有知晓度最广的绰号梗，几乎所有CSGO粉丝都知道“JAME TIME”的梗，"; ";
alias "dyrujt_003" "alias "dyrujt" "dyrujt_004"; say "即便不是在Virtus.pro的比赛中，它也会成为垃圾话出现在游戏频道中。"; ";
alias "dyrujt_004" "alias "dyrujt" "dyrujt_005"; say "实际上这句嘲笑Jame对AWP的热爱的话不仅是一个玩笑，而是一个明智的策略。"; ";
alias "dyrujt_005" "alias "dyrujt" "dyrujt_006"; say "保枪是为了更好的维持经济和保留杀伤力"; ";
alias "dyrujt_006" "alias "dyrujt" "dyrujt_007"; say "当一位玩家经常从对手手中逃脱，以确保自己的武器不被击落，JAME TIME就成为了嘲笑这种惜枪如命的代名词。"; ";
alias "dyrujt_007" "alias "dyrujt" "dyrujt_008"; say "Jame是这方面的大师级人物。"; ";
alias "dyrujt_008" "alias "dyrujt" "dyrujt_009"; say "在Virtus.pro中他担任了指挥了狙击手的双重责任，并且在一些需要冒险性的局势中，他一般都会选择溜之大吉将AWP保留到下一轮。"; ";
alias "dyrujt_009" "alias "dyrujt" "dyrujt_010"; say "Jame的平均每轮死亡数是历史上第二高（0.55），仅低于同CIS赛区Gambit成员Sh1ro（0.54）"; ";
alias "dyrujt_010" "alias "dyrujt" "dyrujt_011"; say "实际上这是增强经济的非常有用的策略"; ";
alias "dyrujt_011" "alias "dyrujt" "dyrujt_012"; say "你可能会因为Jame始终不惜一切代价保留AWP的行为而大笑，但这就是他为团队工作的方式。"; ";
alias "dyrujt_012" "alias "dyrujt" "dyrujt_013"; say "在这种谨慎的比赛风格下，Virtus.pro的狙击手很少会遇到起不了枪的问题。"; ";
alias "dyrujt_013" "alias "dyrujt" "dyrujt_014"; say "而对Jame而言，保AWP不仅可以增强经济和火力，还可以连续击杀那些试图缴枪的敌人。就像在这种情况下一样："; ";
alias "dyrujt_014" "alias "dyrujt" "dyrujt_015"; say "上帝の钱包—SANJI 你读不懂的经济"; ";
alias "dyrujt_015" "alias "dyrujt" "dyrujt_016"; say "作为Virtus.pro体系最重要的一环：SANJI。在Virtus.pro中SANJI通常担任着【辅助Jame】的角色，"; ";
alias "dyrujt_016" "alias "dyrujt" "dyrujt_017"; say "你经常会看到Virtus.pro四人长枪，而SANJI手握长枪钱，但却是【小甲+格洛克】的配置，堪称最惨的辅助角色。"; ";
alias "dyrujt_017" "alias "dyrujt" "dyrujt_018"; say "但正是SANJI的奉献精神，让对手很难猜测Virtus.pro的经济情况。"; ";
alias "dyrujt_018" "alias "dyrujt" "dyrujt_019"; say "你以为Jame起不了狙击枪，但是SANJI转身就丢出了AWP给Jame"; ";
alias "dyrujt_019" "alias "dyrujt" "dyrujt_020"; say "最终导致由于误判送出了首杀，战术被迫打断需要重新收集信息改变策略。"; ";
alias "dyrujt_020" "alias "dyrujt" "dyrujt_021"; say "有趣的是，很多人只知道Jame是一个有趣的保枪选手，事实上他是过去5年中世界上最好的狙击手之一。"; ";
alias "dyrujt_021" "alias "dyrujt" "dyrujt_022"; say "他的职业生涯数据非常出色（个人生涯得分为1.18），并且在2021年的几个月中，"; ";
alias "dyrujt_022" "alias "dyrujt" "dyrujt_001"; say "他已经赢得了CS Summit7的冠军，并晋级了IEM卡托维兹决赛。"; ";

