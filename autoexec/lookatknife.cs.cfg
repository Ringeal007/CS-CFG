//================ Core <Start>================//

// 此部分为脚本的核心（Core）部分。
// 除非你知道自己在做什么，否则请勿做任何修改。

alias "+lookatknife" "+lookatweapon; slot3; +lookatknife_custom_actions; ";
alias "-lookatknife" "-lookatweapon; -lookatknife_custom_actions; ";

//================ Core <End>================//


